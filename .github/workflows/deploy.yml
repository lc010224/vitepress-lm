# 构建 VitePress 站点并将其部署到 GitHub Pages 的示例工作流程
name: Deploy VitePress site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 设置 GITHUB_TOKEN 的权限
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # ✨ 修正点 1：必须取消注释并指定版本，解决 "No pnpm version is specified" 报错
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9  # 指定为你本地使用的版本，例如 9 或 8

      - name: Setup Node
        uses: actions/setup-node@v4 # 建议使用 v4，目前 v6 尚不常用
        with:
          node-version: 20 # 建议使用长期支持版 20
          cache: pnpm

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: pnpm install

      - name: Build with VitePress
        run: pnpm docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # ✨ 修正点 2：确认路径正确。如果你的项目根目录就是 vitepress，
          # 且文档在 docs 文件夹，则路径通常为 docs/.vitepress/dist
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
